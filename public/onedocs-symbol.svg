<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-8px); }
      }
      @keyframes shadow-pulse {
        0%, 100% { transform: scale(1); opacity: 0.25; }
        50% { transform: scale(0.95); opacity: 0.15; }
      }
      .doc-group {
        animation: float 4s ease-in-out infinite;
        transform-origin: center;
      }
    </style>
    <!-- Premium Gradients -->
    <linearGradient id="docGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD43B" />
      <stop offset="100%" stop-color="#F59F00" />
    </linearGradient>
    <linearGradient id="foldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFBE6" />
      <stop offset="100%" stop-color="#FFE566" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#F59F00" flood-opacity="0.25"/>
    </filter>
    <filter id="foldShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="-4" dy="4" stdDeviation="8" flood-color="#C97800" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Animated Container -->
  <g class="doc-group">
    <!-- Ground / Base Drop Shadow substitute -->
    <g transform="translate(96, 64)" filter="url(#shadow)">
      <!-- Main document shape (320x384) -->
      <path d="M 32 0 
               L 224 0 
               L 320 96 
               L 320 352 
               C 320 369.673 305.673 384 288 384 
               L 32 384 
               C 14.327 384 0 369.673 0 352 
               L 0 32 
               C 0 14.327 14.327 0 32 0 Z" 
            fill="url(#docGrad)" />

      <!-- Dog-ear fold -->
      <path d="M 224 0
               L 320 96
               L 256 96
               C 238.327 96 224 81.673 224 64
               Z"
            fill="url(#foldGrad)"
            filter="url(#foldShadow)" />

      <!-- Header block inside doc -->
      <rect x="48" y="48" width="80" height="24" rx="12" fill="#FFFFFF" opacity="0.9" />

      <!-- Content Lines -->
      <circle cx="60" cy="120" r="12" fill="#FFFFFF" opacity="0.8" />
      <rect x="88" y="108" width="160" height="24" rx="12" fill="#FFFFFF" opacity="0.6" />

      <circle cx="60" cy="168" r="12" fill="#FFFFFF" opacity="0.8" />
      <rect x="88" y="156" width="120" height="24" rx="12" fill="#FFFFFF" opacity="0.6" />

      <circle cx="60" cy="216" r="12" fill="#FFFFFF" opacity="0.8" />
      <rect x="88" y="204" width="180" height="24" rx="12" fill="#FFFFFF" opacity="0.6" />

      <circle cx="60" cy="264" r="12" fill="#FFFFFF" opacity="0.8" />
      <rect x="88" y="252" width="100" height="24" rx="12" fill="#FFFFFF" opacity="0.6" />
    </g>
  </g>
</svg>
