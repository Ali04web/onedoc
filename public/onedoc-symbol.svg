<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      /* Smooth, professional float */
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-8px); }
      }

      /* Premium Sheen Glass Effect */
      @keyframes sheen {
        0% { transform: translateX(-150px) skewX(-25deg); }
        25%, 100% { transform: translateX(500px) skewX(-25deg); }
      }

      /* Sequential shrinking/growing lines (Processing effect) */
      @keyframes pulse-line {
        0%, 100% { opacity: 0.6; transform: scaleX(1); }
        50% { opacity: 0.95; transform: scaleX(0.88); }
      }
      
      /* Subtle dot pulse */
      @keyframes dot-pulse {
        0%, 100% { opacity: 0.8; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.15); }
      }

      /* Fold gentle hover */
      @keyframes fold-pulse {
        0%, 100% { transform: translate(0, 0) scale(1); filter: drop-shadow(-4px 4px 6px rgba(201, 120, 0, 0.15)); }
        50% { transform: translate(-2px, 2px) scale(1.02); filter: drop-shadow(-6px 6px 10px rgba(201, 120, 0, 0.25)); }
      }

      .doc-group {
        animation: float 6s ease-in-out infinite;
        transform-origin: center;
      }
      
      .sheen-layer {
        animation: sheen 5s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        transform-origin: top left;
      }

      .line-1 { animation: pulse-line 4s ease-in-out infinite; transform-origin: 88px 120px; }
      .line-2 { animation: pulse-line 4s ease-in-out 0.6s infinite; transform-origin: 88px 168px; }
      .line-3 { animation: pulse-line 4s ease-in-out 1.2s infinite; transform-origin: 88px 216px; }
      .line-4 { animation: pulse-line 4s ease-in-out 1.8s infinite; transform-origin: 88px 264px; }

      .dot-1 { animation: dot-pulse 4s ease-in-out infinite; transform-origin: 60px 120px; }
      .dot-2 { animation: dot-pulse 4s ease-in-out 0.6s infinite; transform-origin: 60px 168px; }
      .dot-3 { animation: dot-pulse 4s ease-in-out 1.2s infinite; transform-origin: 60px 216px; }
      .dot-4 { animation: dot-pulse 4s ease-in-out 1.8s infinite; transform-origin: 60px 264px; }

      .fold {
        animation: fold-pulse 5s ease-in-out infinite;
        transform-origin: 272px 48px;
      }
    </style>

    <!-- Premium Gradients -->
    <linearGradient id="docGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD43B" />
      <stop offset="100%" stop-color="#F59F00" />
    </linearGradient>
    <linearGradient id="foldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFBE6" />
      <stop offset="100%" stop-color="#FFE566" />
    </linearGradient>
    <linearGradient id="sheenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0" />
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0" />
    </linearGradient>

    <!-- Drop Shadows -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#F59F00" flood-opacity="0.25"/>
    </filter>

    <!-- Mask for Sheen to stay inside document boundaries -->
    <clipPath id="docClip">
      <path d="M 32 0 
               L 224 0 
               L 320 96 
               L 320 352 
               C 320 369.673 305.673 384 288 384 
               L 32 384 
               C 14.327 384 0 369.673 0 352 
               L 0 32 
               C 0 14.327 14.327 0 32 0 Z" />
    </clipPath>
  </defs>

  <!-- Animated Container -->
  <g class="doc-group">
    <!-- Base Transform and Main Document Shadow -->
    <g transform="translate(96, 64)" filter="url(#shadow)">
      
      <!-- Main document shape (320x384) -->
      <path d="M 32 0 
               L 224 0 
               L 320 96 
               L 320 352 
               C 320 369.673 305.673 384 288 384 
               L 32 384 
               C 14.327 384 0 369.673 0 352 
               L 0 32 
               C 0 14.327 14.327 0 32 0 Z" 
            fill="url(#docGrad)" />

      <!-- Sheen Layer sweeping over document inside clip path -->
      <g clip-path="url(#docClip)">
        <rect y="-50" width="80" height="484" fill="url(#sheenGrad)" class="sheen-layer" pointer-events="none" />
      </g>

      <!-- Dog-ear fold (animated independently) -->
      <path class="fold" d="M 224 0
               L 320 96
               L 256 96
               C 238.327 96 224 81.673 224 64
               Z"
            fill="url(#foldGrad)" />

      <!-- Header block inside doc -->
      <rect x="48" y="48" width="80" height="24" rx="12" fill="#FFFFFF" opacity="0.9" />

      <!-- Content Lines -->
      <circle class="dot-1" cx="60" cy="120" r="12" fill="#FFFFFF" />
      <rect class="line-1" x="88" y="108" width="160" height="24" rx="12" fill="#FFFFFF" />

      <circle class="dot-2" cx="60" cy="168" r="12" fill="#FFFFFF" />
      <rect class="line-2" x="88" y="156" width="120" height="24" rx="12" fill="#FFFFFF" />

      <circle class="dot-3" cx="60" cy="216" r="12" fill="#FFFFFF" />
      <rect class="line-3" x="88" y="204" width="180" height="24" rx="12" fill="#FFFFFF" />

      <circle class="dot-4" cx="60" cy="264" r="12" fill="#FFFFFF" />
      <rect class="line-4" x="88" y="252" width="100" height="24" rx="12" fill="#FFFFFF" />

    </g>
  </g>
</svg>
